---
- name: Derive media compose CLI args
  ansible.builtin.set_fact:
    media_base_domain: "{{ lookup('ansible.builtin.env', 'BASE_DOMAIN') | default('carlosjg.space', true) }}"
    media_certbot_email: >-
      {{
        lookup('ansible.builtin.env', 'CERTBOT_EMAIL')
        | default('admin@' ~ (lookup('ansible.builtin.env', 'BASE_DOMAIN') | default('carlosjg.space', true)), true)
      }}
    media_public_domains:
      - "immich.{{ lookup('ansible.builtin.env', 'BASE_DOMAIN') | default('carlosjg.space', true) }}"
      - "couchdb.{{ lookup('ansible.builtin.env', 'BASE_DOMAIN') | default('carlosjg.space', true) }}"
    media_cert_name: "media-edge-{{ (lookup('ansible.builtin.env', 'BASE_DOMAIN') | default('carlosjg.space', true)) | replace('.', '-') }}"
    deploy_media_compose_args: >-
      {{
        '-f ' ~ (deploy_stack.compose_cli_files | join(' -f '))
      }}

- name: Install certbot packages for media TLS
  ansible.builtin.apt:
    name:
      - certbot
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Allow media edge ports through UFW
  ansible.builtin.command: "ufw allow {{ item }}/tcp"
  loop:
    - 80
    - 443
  register: deploy_media_ufw_allow_rule
  changed_when: >-
    'Rule added' in deploy_media_ufw_allow_rule.stdout or
    'Rules updated' in deploy_media_ufw_allow_rule.stdout
  failed_when: false

- name: Check whether media TLS certificate already exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ media_cert_name }}/fullchain.pem"
  register: media_tls_cert

- name: Ensure shared Docker networks exist
  ansible.builtin.command:
    cmd: docker network create {{ item }}
  register: deploy_media_network_create
  changed_when: deploy_media_network_create.rc == 0
  failed_when: deploy_media_network_create.rc != 0 and 'already exists' not in deploy_media_network_create.stderr
  loop: "{{ shared_docker_networks | default([]) }}"

- name: Ensure media deploy directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop: "{{ deploy_stack.directories | default([]) }}"

- name: Stage media runtime secret files
  ansible.builtin.copy:
    src: "{{ item.source_file }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode | default('0600') }}"
  loop: "{{ deploy_stack.staged_secret_files | default([]) }}"
  when: item.source_file | default('') | length > 0
  register: deploy_media_secret_copy

- name: Assert required media runtime files exist
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ deploy_stack.required_files | default([]) }}"
  register: deploy_media_required_files

- name: Stop media deploy when required files missing
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Missing required media file: {{ item.item }}"
  loop: "{{ deploy_media_required_files.results }}"

- name: Copy media static config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode | default('0644') }}"
  loop: "{{ deploy_stack.config_files | default([]) }}"
  register: deploy_media_config_copy

- name: Render media nginx routing
  ansible.builtin.template:
    src: media.conf.j2
    dest: "{{ deploy_stack.project_dir }}/nginx/conf.d/media.conf"
    owner: root
    group: root
    mode: "0644"
  vars:
    immich_domain: "{{ media_public_domains[0] }}"
    couchdb_domain: "{{ media_public_domains[1] }}"
    media_cert_name: "{{ media_cert_name }}"
    media_tls_enabled: "{{ media_tls_cert.stat.exists }}"
  register: deploy_media_nginx_template_pre_tls

- name: Copy media stack compose files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ deploy_stack.compose_files }}"
  register: deploy_media_compose_copy

- name: Link active environment file into media stack directory
  ansible.builtin.file:
    src: "{{ deploy_stack.env_path }}"
    dest: "{{ deploy_stack.project_dir }}/.env"
    state: link
  register: deploy_media_env_link

- name: Derive media runtime actions
  ansible.builtin.set_fact:
    deploy_media_recreate_services: >-
      {{
        (
          (
            deploy_media_secret_copy.results | default([])
            | selectattr('changed')
            | map(attribute='item.recreate_services')
            | select('defined')
            | list
            | flatten
          )
          + (
            deploy_stack.compose_services | default([])
            if (
              deploy_media_compose_copy.results | default([])
              | selectattr('changed')
              | list
              | length
            ) > 0 or deploy_media_env_link.changed
            else []
          )
        ) | unique
      }}

- name: Derive media config-only restarts
  ansible.builtin.set_fact:
    deploy_media_restart_services: >-
      {{
        (
          deploy_media_config_copy.results | default([])
          | selectattr('changed')
          | map(attribute='item.restart_services')
          | select('defined')
          | list
          | flatten
        ) | difference(deploy_media_recreate_services | default([]))
      }}

- name: Validate rendered media Compose configuration
  ansible.builtin.command:
    cmd: docker compose --env-file {{ deploy_stack.env_path }} {{ deploy_media_compose_args }} config
  changed_when: false

- name: Pull media stack images
  ansible.builtin.command:
    cmd: docker compose --env-file {{ deploy_stack.env_path }} {{ deploy_media_compose_args }} pull
  register: deploy_media_pull
  changed_when: >-
    'Downloaded newer image' in deploy_media_pull.stdout or
    'Pull complete' in deploy_media_pull.stdout or
    'newer image' in deploy_media_pull.stdout

- name: Deploy media stack
  ansible.builtin.command:
    cmd: docker compose --env-file {{ deploy_stack.env_path }} {{ deploy_media_compose_args }} up -d
  register: deploy_media_up
  changed_when: >-
    'Started' in deploy_media_up.stdout or
    'Recreated' in deploy_media_up.stdout or
    'Creating' in deploy_media_up.stdout

- name: Obtain or renew media TLS certificate
  ansible.builtin.command:
    cmd: >-
      certbot certonly --non-interactive --agree-tos
      --email {{ media_certbot_email }}
      --cert-name {{ media_cert_name }}
      {% if media_tls_cert.stat.exists %}--expand{% else %}--duplicate{% endif %}
      --webroot -w {{ deploy_stack.project_dir }}/nginx/acme
      {% for domain in media_public_domains %}-d {{ domain }} {% endfor %}
      --keep-until-expiring
  register: media_certbot_result
  changed_when: >-
    'Successfully received certificate' in media_certbot_result.stdout or
    'Congratulations' in media_certbot_result.stdout or
    'Certificate not yet due for renewal' not in media_certbot_result.stdout

- name: Re-check media TLS certificate
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ media_cert_name }}/fullchain.pem"
  register: media_tls_cert_after

- name: Ensure media TLS certificate exists
  ansible.builtin.assert:
    that:
      - media_tls_cert_after.stat.exists
    fail_msg: "Media TLS certificate was not created by certbot."

- name: Render media nginx routing with TLS enabled
  ansible.builtin.template:
    src: media.conf.j2
    dest: "{{ deploy_stack.project_dir }}/nginx/conf.d/media.conf"
    owner: root
    group: root
    mode: "0644"
  vars:
    immich_domain: "{{ media_public_domains[0] }}"
    couchdb_domain: "{{ media_public_domains[1] }}"
    media_cert_name: "{{ media_cert_name }}"
    media_tls_enabled: true
  register: deploy_media_nginx_template_tls

- name: Redeploy media stack with TLS enabled
  ansible.builtin.command:
    cmd: docker compose --env-file {{ deploy_stack.env_path }} {{ deploy_media_compose_args }} up -d
  register: deploy_media_tls_up
  changed_when: >-
    'Started' in deploy_media_tls_up.stdout or
    'Recreated' in deploy_media_tls_up.stdout or
    'Creating' in deploy_media_tls_up.stdout

- name: Force recreate media services with runtime definition changes
  ansible.builtin.command:
    cmd: >-
      docker compose --env-file {{ deploy_stack.env_path }}
      {{ deploy_media_compose_args }}
      up -d --force-recreate {{ deploy_media_recreate_services | join(' ') }}
  when: deploy_media_recreate_services | length > 0
  register: deploy_media_force_recreate
  changed_when: >-
    'Started' in deploy_media_force_recreate.stdout or
    'Recreated' in deploy_media_force_recreate.stdout or
    'Creating' in deploy_media_force_recreate.stdout

- name: Restart media services with config-only changes
  ansible.builtin.command:
    cmd: >-
      docker compose --env-file {{ deploy_stack.env_path }}
      {{ deploy_media_compose_args }}
      restart {{ deploy_media_restart_services | join(' ') }}
  when: deploy_media_restart_services | length > 0
  register: deploy_media_restart
  changed_when: deploy_media_restart_services | length > 0
