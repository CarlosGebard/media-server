---
- name: Deploy media stack
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load inventory group vars fragments
      ansible.builtin.include_vars:
        dir: "{{ playbook_dir }}/../inventories/production/group_vars"
        extensions:
          - yml

  vars:
    deploy_stack: "{{ deploy.media }}"

  roles:
    - role: deploy/media

