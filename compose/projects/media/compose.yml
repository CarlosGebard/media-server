services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    container_name: immich_server
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    healthcheck:
      disable: false
    networks:
      - media_backend
      - shared_backend

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
    container_name: immich_machine_learning
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - model-cache:/cache
    healthcheck:
      disable: false
    networks:
      - media_backend

  redis:
    image: docker.io/valkey/valkey:9
    container_name: immich_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - media_backend

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_DB: ${DB_DATABASE_NAME:-immich}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    shm_size: 128mb
    healthcheck:
      disable: false
    networks:
      - media_backend

  couchdb:
    image: couchdb:3.5.1
    container_name: couchdb
    user: "5984:5984"
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD}@127.0.0.1:5984/_up >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - media_backend
      - shared_backend

  nginx:
    image: nginx:1.28.3-alpine
    container_name: media_nginx
    restart: unless-stopped
    depends_on:
      immich-server:
        condition: service_started
      couchdb:
        condition: service_healthy
    volumes:
      - ../../configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../configs/nginx/conf.d:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - media_backend
      - shared_backend

volumes:
  model-cache:

networks:
  media_backend:
    driver: bridge
  shared_backend:
    name: infra_shared_backend
    external: true
