services:
  immich-server:
    ports:
      - "${IMMICH_BIND_IP:-127.0.0.1}:${IMMICH_HTTP_PORT:-2283}:2283"
    volumes:
      - ${UPLOAD_LOCATION:-/srv/data/media/immich/app}:/data
      - /etc/localtime:/etc/localtime:ro

  database:
    volumes:
      - ${DB_DATA_LOCATION:-/srv/data/media/immich/postgres}:/var/lib/postgresql/data

  couchdb:
    volumes:
      - /srv/data/media/couchdb/data:/opt/couchdb/data
      - /srv/apps/media/couchdb/local.d/local.ini:/opt/couchdb/etc/local.d/local.ini:ro

  nginx:
    ports:
      - "${NGINX_BIND_IP:-0.0.0.0}:${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_BIND_IP:-0.0.0.0}:${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - /srv/apps/media/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /srv/apps/media/nginx/conf.d:/etc/nginx/conf.d:ro
      - /srv/apps/media/nginx/acme:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
