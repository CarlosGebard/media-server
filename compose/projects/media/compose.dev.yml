services:
  immich-server:
    ports:
      - "${IMMICH_BIND_IP:-127.0.0.1}:${IMMICH_HTTP_PORT:-2283}:2283"
    volumes:
      - ../../.tmp/media/immich/app:/data
      - /etc/localtime:/etc/localtime:ro

  database:
    volumes:
      - ../../.tmp/media/immich/postgres:/var/lib/postgresql/data

  couchdb:
    ports:
      - "${COUCHDB_BIND_IP:-127.0.0.1}:${COUCHDB_HTTP_PORT:-5984}:5984"
    volumes:
      - ../../.tmp/media/couchdb/data:/opt/couchdb/data
      - ../../configs/couchdb/local.d/local.ini:/opt/couchdb/etc/local.d/local.ini:ro

  nginx:
    ports:
      - "${NGINX_BIND_IP:-127.0.0.1}:${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_BIND_IP:-127.0.0.1}:${NGINX_COUCHDB_PORT:-15984}:5984"
      - "${NGINX_BIND_IP:-127.0.0.1}:${NGINX_WIKI_PORT:-13000}:3000"
