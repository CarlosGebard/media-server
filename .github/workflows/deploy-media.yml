name: Deploy Personal Media

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to deploy
        required: true
        default: main
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "ansible/**"
      - "compose/**"
      - "tests/ansible/**"
      - "Makefile"

concurrency:
  group: personal-media-deploy
  cancel-in-progress: false

env:
  DEPLOY_GIT_REF: ${{ inputs.git_ref || github.sha }}

jobs:
  deploy:
    name: Deploy Media Stack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_GIT_REF }}

      - name: Pull secrets from Infisical via OIDC
        uses: Infisical/secrets-action@v1.0.10
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG }}
          secret-path: ${{ vars.INFISICAL_SECRET_PATH }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Validate Ansible integrity
        run: ./tests/ansible/check.sh

      - name: Prepare SSH material
        env:
          PROD_HOST: ${{ env.PROD_HOST }}
          PROD_SSH_KNOWN_HOSTS: ${{ env.PROD_SSH_KNOWN_HOSTS }}
          PROD_SSH_PORT: ${{ env.PROD_SSH_PORT }}
          PROD_SSH_PRIVATE_KEY: ${{ env.PROD_SSH_PRIVATE_KEY }}
        run: bash .github/scripts/prepare-ssh.sh

      - name: Materialize media runtime env
        env:
          IMMICH_VERSION: ${{ env.IMMICH_VERSION }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          COUCHDB_USER: ${{ env.COUCHDB_USER }}
          COUCHDB_PASSWORD: ${{ env.COUCHDB_PASSWORD }}
        run: |
          set -euo pipefail
          : "${DB_PASSWORD:?Missing DB_PASSWORD}"
          : "${COUCHDB_USER:?Missing COUCHDB_USER}"
          : "${COUCHDB_PASSWORD:?Missing COUCHDB_PASSWORD}"
          quote_env() {
            local value="$1"
            value="${value//\'/\\\'}"
            printf "'%s'" "$value"
          }
          {
            printf 'IMMICH_VERSION=%s\n' "$(quote_env "${IMMICH_VERSION:-v2}")"
            printf 'UPLOAD_LOCATION=%s\n' "$(quote_env "/srv/data/media/immich/library")"
            printf 'DB_DATA_LOCATION=%s\n' "$(quote_env "/srv/data/media/immich/postgres")"
            printf 'DB_PASSWORD=%s\n' "$(quote_env "$DB_PASSWORD")"
            printf 'DB_USERNAME=%s\n' "$(quote_env "postgres")"
            printf 'DB_DATABASE_NAME=%s\n' "$(quote_env "immich")"
            printf 'COUCHDB_USER=%s\n' "$(quote_env "$COUCHDB_USER")"
            printf 'COUCHDB_PASSWORD=%s\n' "$(quote_env "$COUCHDB_PASSWORD")"
            printf 'NGINX_BIND_IP=%s\n' "$(quote_env "0.0.0.0")"
            printf 'NGINX_HTTP_PORT=%s\n' "$(quote_env "80")"
            printf 'NGINX_HTTPS_PORT=%s\n' "$(quote_env "443")"
            printf 'TZ=%s\n' "$(quote_env "America/Santiago")"
          } > /tmp/media-runtime.env
          chmod 600 /tmp/media-runtime.env

      - name: Build inventory
        env:
          PROD_HOST: ${{ env.PROD_HOST }}
          PROD_SSH_PORT: ${{ env.PROD_SSH_PORT }}
        run: bash .github/scripts/build-deploy-inventory.sh

      - name: Validate deploy files exist
        run: |
          set -euo pipefail
          [[ -f /tmp/media-runtime.env ]] || { echo "Missing /tmp/media-runtime.env"; exit 1; }
          [[ -f /tmp/deploy-hosts.yml ]] || { echo "Missing /tmp/deploy-hosts.yml"; exit 1; }

      - name: Deploy media
        env:
          ANSIBLE_HOST_KEY_CHECKING: "true"
          MEDIA_RUNTIME_ENV_SOURCE_FILE: /tmp/media-runtime.env
          BASE_DOMAIN: carlosjg.space
          CERTBOT_EMAIL: ${{ env.CERTBOT_EMAIL }}
        run: |
          set -euo pipefail
          cd ansible
          ansible-playbook -i /tmp/deploy-hosts.yml playbooks/deploy-media.yml
